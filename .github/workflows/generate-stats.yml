name: Generate GitHub Stats & Banner

on:
  push:
    branches: [ main ]
  schedule:
    # Run every 12 hours (at 00:00 and 12:00 UTC)
    - cron: '0 0,12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-assets:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Generate stats SVGs and blog cards
        env:
          # GH_STATS_TOKEN (fine-grained PAT) incluye repos privados en los
          # lenguajes; si no existe, cae al GITHUB_TOKEN (solo público).
          STATS_TOKEN: ${{ secrets.GH_STATS_TOKEN || secrets.GITHUB_TOKEN }}
        run: python generate_stats.py

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add generated/*.svg README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "📊 Update GitHub stats & blog posts"
          git push
